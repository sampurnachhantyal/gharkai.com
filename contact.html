<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Gharkai.com</title>
    <meta name="description" content="Get in touch with Gharkai for inquiries and more information about our services.">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/"><img src="assets/images/logo.png" alt="Gharkai Logo" class="logo"></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About Us</a></li>
                <li><a href="/services">Services</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/contact">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-us">
            <h1>Contact Us</h1>
            <p>Phone: 123-456-7890<br>Email: contact@gharkai.com</p>
            <form action="/submit-form" method="post" id="contactForm">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="social-media">
            <a href="https://facebook.com/gharkai" target="_blank"><img src="assets/images/facebook-icon.png" alt="Facebook"></a>
            <a href="https://instagram.com/gharkai" target="_blank"><img src="assets/images/instagram-icon.png" alt="Instagram"></a>
            <a href="https://linkedin.com/company/gharkai" target="_blank"><img src="assets/images/linkedin-icon.png" alt="LinkedIn"></a>
        </div>
        <p>Privacy Policy | Terms of Service</p>
        <p>&copy; 2023 Gharkai. All rights reserved.</p>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
